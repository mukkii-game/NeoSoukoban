<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a14" />
<title>あなふさぎのよる</title>
<style>
  :root {
    --bg:#0a0a14; --panel:#14142a; --panel2:#1b1b36; --line:#2c2c52;
    --text:#e8e8ff; --sub:#9f9fd0; --accent:#7f5af0; --gold:#ffd76a;
    --danger:#ff5577; --mint:#6dffd0; --cell:48px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    margin:0; min-height:100%; color:var(--text);
    background:radial-gradient(circle at 50% -10%, #1b1b3c 0%, #0e0e20 45%, #05050c 100%);
    font-family:'Segoe UI', system-ui, -apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', sans-serif;
    overscroll-behavior:none;
  }
  body { display:flex; justify-content:center; }
  #app { width:100%; max-width:640px; min-height:100dvh; display:flex; flex-direction:column; padding:env(safe-area-inset-top) 8px env(safe-area-inset-bottom); }
  button { font-family:inherit; color:var(--text); cursor:pointer; border:none; background:none; }
  .screen { display:none; flex:1; flex-direction:column; }
  .screen.active { display:flex; }

  /* ============ 共通ボタン ============ */
  .btn {
    display:block; margin:8px auto; padding:12px 34px; font-size:17px; font-weight:600;
    background:linear-gradient(180deg, #2a2a54, #1d1d3e); border:1px solid var(--line);
    border-radius:14px; box-shadow:0 3px 12px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
    transition:transform .08s, box-shadow .12s, border-color .12s;
  }
  .btn:hover { border-color:var(--accent); box-shadow:0 3px 18px rgba(127,90,240,.35); }
  .btn:active { transform:scale(.96); }
  .btn.primary { background:linear-gradient(180deg, #6d4de0, #4d33ad); border-color:#8f72f5; }

  /* ============ タイトル ============ */
  #screen-title { justify-content:center; align-items:center; text-align:center; gap:4px; }
  #title-moon { font-size:44px; animation:floaty 4.2s ease-in-out infinite; }
  #title-logo { font-size:clamp(34px, 9vw, 52px); font-weight:800; letter-spacing:.06em; margin:2px 0 0;
    background:linear-gradient(180deg, #f2ecff 20%, #a98ffb 90%); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 34px rgba(127,90,240,.35); }
  #title-sub { color:var(--sub); font-size:14px; margin:6px 0 18px; }
  #title-stage { display:flex; align-items:flex-end; gap:26px; font-size:34px; margin-bottom:24px; height:56px; }
  #title-stage .cat { animation:floaty 3s ease-in-out infinite; }
  #title-stage .hole-demo { position:relative; width:46px; height:30px; overflow:hidden; border-radius:50%; }
  #title-stage .hole-demo .pit { position:absolute; inset:0; border-radius:50%; background:radial-gradient(ellipse at 50% 45%, #000 55%, #1d1d3e 78%, transparent 80%); box-shadow:inset 0 4px 8px #000; }
  #title-stage .hole-demo .peek { position:absolute; left:0; right:0; text-align:center; bottom:2px; font-size:22px; animation:peek 3.6s ease-in-out infinite; }
  .note { color:var(--sub); font-size:12px; line-height:1.9; margin-top:22px; }
  kbd { background:#1a1a2e; border:1px solid #39395f; border-radius:4px; padding:0 5px; font-size:11px; }

  @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  @keyframes peek { 0%,55%,100%{transform:translateY(115%)} 68%,88%{transform:translateY(18%)} }

  /* ============ レベルせんたく ============ */
  #screen-select { padding-top:14px; }
  #screen-select h2 { text-align:center; font-size:20px; margin:8px 0 14px; letter-spacing:.15em; }
  #level-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; padding:0 6px; }
  .level-card {
    padding:12px 6px 10px; border-radius:14px; text-align:center;
    background:linear-gradient(180deg, var(--panel2), var(--panel)); border:1px solid var(--line);
    transition:transform .08s, border-color .12s, box-shadow .12s;
  }
  .level-card:not(.locked):hover { border-color:var(--accent); box-shadow:0 2px 16px rgba(127,90,240,.3); transform:translateY(-2px); }
  .level-card .t { font-size:11px; color:var(--sub); letter-spacing:.08em; }
  .level-card .n { font-size:13px; font-weight:700; margin:5px 0 3px; min-height:18px; }
  .level-card .s { font-size:14px; min-height:20px; }
  .level-card.locked { opacity:.45; cursor:default; }
  .level-card.cleared .s { color:var(--gold); }
  #select-back { margin-top:16px; }
  #btn-unlock-all { display:block; margin:2px auto 14px; color:#55558a; font-size:11.5px; padding:6px 10px; }
  #btn-unlock-all:hover { color:var(--sub); }

  /* ============ ゲーム画面 ============ */
  #screen-game { padding-top:6px; }
  #hud { display:flex; align-items:center; gap:8px; padding:4px 2px; }
  #hud .icon-btn {
    width:40px; height:40px; border-radius:12px; font-size:17px; flex:none;
    background:var(--panel2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    transition:border-color .12s, transform .08s;
  }
  #hud .icon-btn:active { transform:scale(.92); }
  #hud .icon-btn:hover { border-color:var(--accent); }
  #hud-info { flex:1; min-width:0; text-align:center; line-height:1.25; }
  #hud-time { font-size:11px; color:var(--sub); letter-spacing:.14em; }
  #hud-name { font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #hud-turn { font-size:11px; color:var(--sub); min-width:52px; text-align:right; flex:none; }

  #board-wrap { position:relative; flex:none; display:flex; justify-content:center; align-items:center; padding:10px 0 4px; touch-action:none; }
  #board { position:relative; border-radius:12px; }
  #board.walled { box-shadow:0 0 40px rgba(127,90,240,.14), 0 8px 30px rgba(0,0,0,.5); }
  #board.wrapmode { box-shadow:0 8px 30px rgba(0,0,0,.5); }

  .layer { position:absolute; left:0; top:0; }
  .cell { position:absolute; width:var(--cell); height:var(--cell); }
  .floor { background:#151530; }
  .floor.alt { background:#171734; }
  .floor::after { content:''; position:absolute; inset:0; box-shadow:inset 0 0 1px rgba(120,120,200,.12); }
  .wall {
    background:linear-gradient(180deg, #242448, #1b1b3a);
    box-shadow:inset 1px 1px 0 rgba(160,160,255,.09), inset -1px -2px 0 rgba(0,0,0,.45);
  }
  /* おせないかべ: ほんの少しだけ違う（わずかに暗く、かすかな鋲） */
  .wall.hard { background:linear-gradient(180deg, #20203f, #181834); }
  .wall.hard::after { content:''; position:absolute; inset:0;
    background:radial-gradient(circle at 30% 30%, rgba(150,150,215,.10) 0 5%, transparent 6%),
               radial-gradient(circle at 70% 70%, rgba(150,150,215,.10) 0 5%, transparent 6%); }
  .hole-tile { background:transparent; transition:left .12s ease-out, top .12s ease-out; z-index:2; }
  .hole-tile .pit {
    position:absolute; inset:9%; border-radius:50%;
    background:radial-gradient(circle at 50% 40%, #000 42%, #0a0a18 64%, #2b2b58 88%, #41417e 97%, transparent 100%);
    box-shadow:inset 0 6px 12px #000;
    transition:transform .25s;
  }
  .hole-tile:not(.plugged) .pit { animation:holePulse 2.6s ease-in-out infinite; }
  @keyframes holePulse {
    0%,100% { box-shadow:inset 0 6px 12px #000, 0 0 6px rgba(127,90,240,.20); transform:scale(1); }
    50%     { box-shadow:inset 0 6px 12px #000, 0 0 15px rgba(127,90,240,.5); transform:scale(1.05); }
  }
  .hole-tile .peek {
    position:absolute; left:0; right:0; bottom:16%; text-align:center;
    font-size:calc(var(--cell) * .42); opacity:0; transform:translateY(40%); transition:opacity .3s, transform .3s;
    pointer-events:none;
  }
  .hole-tile.eyes .peek { opacity:1; transform:translateY(0); animation:eyeWobble 1s ease-in-out infinite; }
  @keyframes eyeWobble { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12%)} }
  .hole-tile.plugged .pit { background:radial-gradient(circle at 50% 42%, #0e0e20 40%, #23234a 90%, transparent 100%); }
  .hole-tile .plug-emoji {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:calc(var(--cell) * .62); filter:brightness(.75) saturate(.8); transform:translateY(8%) scale(.92);
  }
  .hole-tile .plug-emoji.ghosty { filter:brightness(.9); opacity:.92; }
  .hole-tile .plug-wall {
    position:absolute; inset:13%; border-radius:5px;
    background:linear-gradient(180deg, #242448, #1b1b3a);
    box-shadow:inset 0 2px 5px rgba(0,0,0,.7); filter:brightness(.62);
    transform:translateY(6%);
  }

  .sprite {
    position:absolute; width:var(--cell); height:var(--cell); left:0; top:0;
    display:flex; align-items:center; justify-content:center;
    font-size:calc(var(--cell) * .74); line-height:1;
    transition:transform .11s ease-out; will-change:transform; z-index:3;
    text-shadow:0 3px 6px rgba(0,0,0,.5);
  }
  .sprite.notrans { transition:none; }
  .sprite .body { display:block; }
  .sprite.player { z-index:5; }
  .sprite.player .body { animation:idleBob 2.2s ease-in-out infinite; }
  .sprite.ghost .body { animation:ghostBob 2.2s ease-in-out infinite; opacity:.95; }
  .sprite.ghost { z-index:4; }
  .sprite.box .body { animation:boxSway 3.6s ease-in-out infinite; }
  @keyframes idleBob {
    0%,100% { transform:translateY(0) rotate(-2.5deg) scale(1,1); }
    50%     { transform:translateY(-8%) rotate(2.5deg) scale(1.04,.96); }
  }
  @keyframes ghostBob {
    0%,100% { transform:translateY(-9%) rotate(-4deg); }
    50%     { transform:translateY(7%) rotate(4deg); }
  }
  @keyframes boxSway { 0%,100%{transform:rotate(0)} 25%{transform:translateY(-2%) rotate(-1.2deg)} 75%{transform:translateY(1%) rotate(1.2deg)} }
  .sprite.hop .body { animation:hop .16s ease-out; }
  @keyframes hop { 0%{transform:scale(1.2,.8)} 60%{transform:scale(.94,1.06)} 100%{transform:scale(1,1)} }
  /* 押せるかべ: 見た目は通常のかべタイルと完全に同じ（それが仕掛け） */
  .sprite.wallobj { z-index:2; }
  .sprite.wallobj .body {
    position:absolute; inset:0; animation:none;
    background:linear-gradient(180deg, #242448, #1b1b3a);
    box-shadow:inset 1px 1px 0 rgba(160,160,255,.09), inset -1px -2px 0 rgba(0,0,0,.45);
  }
  .sprite.ghost.dodging .body { animation:dodgeWiggle .35s ease-out; }
  @keyframes dodgeWiggle {
    0%{transform:translateX(0)} 30%{transform:translateX(26%) rotate(9deg) scaleX(.9)}
    65%{transform:translateX(-14%) rotate(-6deg)} 100%{transform:translateX(0)}
  }
  .sprite.ghost.dizzy .body { animation:dizzySpin .55s ease-out; }
  @keyframes dizzySpin { 0%{transform:rotate(0) scale(1.1)} 60%{transform:rotate(340deg)} 100%{transform:rotate(360deg) scale(1)} }
  .shakeit { animation:shakeit .18s ease-in-out; }
  @keyframes shakeit { 0%,100%{margin-left:0} 30%{margin-left:-4px} 65%{margin-left:4px} }

  .fx {
    position:absolute; z-index:9; pointer-events:none; font-size:calc(var(--cell) * .5); font-weight:700;
    animation:fxUp .7s ease-out forwards; text-shadow:0 2px 5px rgba(0,0,0,.7);
    display:flex; align-items:center; justify-content:center; width:var(--cell); height:var(--cell);
  }
  @keyframes fxUp { 0%{opacity:1; transform:translateY(0) scale(1)} 100%{opacity:0; transform:translateY(-26px) scale(1.1)} }
  .fx.pop { animation:fxPop .5s ease-out forwards; }
  @keyframes fxPop { 0%{opacity:.9; transform:scale(.4)} 60%{opacity:1; transform:scale(1.2)} 100%{opacity:0; transform:scale(1.35)} }

  #whisper {
    min-height:24px; text-align:center; color:var(--sub); font-size:13px; padding:2px 12px;
    opacity:0; transition:opacity .8s;
  }
  #whisper.show { opacity:1; }

  #game-footer { text-align:center; color:#6d6da0; font-size:11.5px; padding:4px 0 8px; }

  /* ============ タッチ操作 ============ */
  #touch-controls { display:none; padding:2px 0 12px; }
  #dpad { display:grid; grid-template-columns:repeat(3, 62px); grid-template-rows:repeat(3, 54px); gap:6px; justify-content:center; }
  .dbtn {
    border-radius:14px; font-size:20px; background:var(--panel2); border:1px solid var(--line);
    box-shadow:0 3px 8px rgba(0,0,0,.4); user-select:none; touch-action:manipulation;
  }
  .dbtn:active { background:#2b2b58; transform:scale(.94); }
  .dbtn.waitb { font-size:13px; color:var(--sub); }
  @media (hover:none) and (pointer:coarse) { #touch-controls { display:block; } #game-footer { display:none; } }

  /* ============ オーバーレイ ============ */
  .overlay {
    position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center;
    background:rgba(5,5,12,.72); backdrop-filter:blur(3px);
  }
  .overlay.active { display:flex; }
  .overlay .card {
    width:min(88vw, 380px); text-align:center; padding:26px 20px 20px; border-radius:20px;
    background:linear-gradient(180deg, #1e1e40, #141430); border:1px solid var(--line);
    box-shadow:0 14px 50px rgba(0,0,0,.6); animation:cardIn .22s ease-out;
  }
  @keyframes cardIn { 0%{opacity:0; transform:translateY(14px) scale(.96)} 100%{opacity:1; transform:none} }
  .overlay h3 { margin:0 0 6px; font-size:22px; letter-spacing:.08em; }
  .overlay .desc { color:var(--sub); font-size:13.5px; margin:4px 0 14px; line-height:1.7; }
  .overlay .big { font-size:42px; margin:4px 0 8px; }
  #ov-clear h3 { color:var(--mint); }
  #ov-caught h3 { color:var(--danger); }

  /* ============ エンディング ============ */
  #screen-ending { justify-content:center; align-items:center; text-align:center; position:relative; overflow:hidden; }
  #screen-ending.dawn { animation:dawnRise 9s ease-in forwards; }
  @keyframes dawnRise { 0%{background:transparent} 100%{background:linear-gradient(180deg, rgba(255,160,90,.16), rgba(255,220,150,.05))} }
  #ending-lines { min-height:200px; display:flex; flex-direction:column; justify-content:center; gap:16px; font-size:17px; line-height:1.9; }
  #ending-lines .line { opacity:0; transform:translateY(8px); transition:opacity 1.1s, transform 1.1s; }
  #ending-lines .line.show { opacity:1; transform:none; }
  #ending-lines .em { font-size:34px; }
  #ending-skip { color:var(--sub); font-size:12px; margin-top:26px; }
</style>
</head>
<body>
<div id="app">

  <!-- タイトル -->
  <section id="screen-title" class="screen active">
    <div id="title-moon">🌙</div>
    <h1 id="title-logo">あなふさぎのよる</h1>
    <div id="title-sub">ちいさな そうこばんの、ながい ながい よる。</div>
    <div id="title-stage">
      <span class="cat">🐱</span>
      <span class="hole-demo"><span class="pit"></span><span class="peek">👀</span></span>
      <span style="font-size:26px; opacity:.85; animation:floaty 2.6s ease-in-out infinite;">👻</span>
    </div>
    <button class="btn primary" id="btn-start">▶ はじめる</button>
    <button class="btn" id="btn-select">レベルを えらぶ</button>
    <div class="note">
      <kbd>矢印</kbd>/<kbd>WASD</kbd> うごく・おす（ぶつかっても1ターンすすむ）<br/>
      <kbd>Z</kbd> ひとつもどす　<kbd>R</kbd> やりなおす　（スマホはスワイプ/ボタン）
    </div>
  </section>

  <!-- レベルせんたく -->
  <section id="screen-select" class="screen">
    <h2>― よるの きろく ―</h2>
    <div id="level-grid"></div>
    <button class="btn" id="select-back">タイトルへ</button>
    <button id="btn-unlock-all" title="検証用: すべてのレベルをひらく">🔓 テスト: ぜんぶ ひらく</button>
  </section>

  <!-- ゲーム -->
  <section id="screen-game" class="screen">
    <div id="hud">
      <button class="icon-btn" id="btn-levels" title="レベルせんたく (Esc)">📋</button>
      <div id="hud-info">
        <div id="hud-time"></div>
        <div id="hud-name"></div>
      </div>
      <div id="hud-turn"></div>
      <button class="icon-btn" id="btn-undo" title="ひとつもどす (Z)">↩</button>
      <button class="icon-btn" id="btn-retry" title="やりなおす (R)">⟳</button>
      <button class="icon-btn" id="btn-solution" title="こたえをみる（ギブアップ）">💡</button>
      <button class="icon-btn" id="btn-mute" title="おと (M)">🔊</button>
    </div>
    <div id="board-wrap">
      <div id="board">
        <div class="layer" id="tiles"></div>
        <div class="layer" id="objs"></div>
        <div class="layer" id="fx"></div>
      </div>
    </div>
    <div id="whisper">💭</div>
    <div id="game-footer">矢印/WASD うごく（ぶつかっても1ターンすすむ）・ Z もどす ・ R やりなおす</div>
    <div id="touch-controls">
      <div id="dpad">
        <div></div><button class="dbtn" data-dir="up">▲</button><div></div>
        <button class="dbtn" data-dir="left">◀</button><button class="dbtn waitb" data-dir="wait">まつ</button><button class="dbtn" data-dir="right">▶</button>
        <div></div><button class="dbtn" data-dir="down">▼</button><div></div>
      </div>
    </div>
  </section>

  <!-- エンディング -->
  <section id="screen-ending" class="screen">
    <div id="ending-lines"></div>
    <button class="btn" id="btn-ending-done" style="display:none;">タイトルへ</button>
    <div id="ending-skip">タップ / キーで すすむ</div>
  </section>

</div>

<!-- クリア -->
<div class="overlay" id="ov-clear">
  <div class="card">
    <div class="big">✨🕳✨</div>
    <h3>ふさいだ！</h3>
    <div class="desc" id="clear-desc"></div>
    <button class="btn primary" id="btn-next">つぎの じかんへ <small>(Enter)</small></button>
    <button class="btn" id="btn-clear-retry">もういちど</button>
    <button class="btn" id="btn-clear-levels">レベルせんたく</button>
  </div>
</div>

<script src="engine.js"></script>
<script src="levels.js"></script>
<script src="solutions.js"></script>
<script src="main.js"></script>
</body>
</html>
