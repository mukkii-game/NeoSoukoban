  html, body { margin:0; height:100%; background:radial-gradient(circle at top, #171730 0%, #0a0a14 55%, #05050a 100%); color:var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow:hidden; }
  body { display:flex; align-items:center; justify-content:center; }
  .wrap { width:min(96vw, 920px); text-align:center; }
  canvas { width:100%; max-width:900px; aspect-ratio: 5 / 4; display:block; margin:auto; border:1px solid rgba(127,90,240,.5); border-radius:18px; background:#111125; box-shadow:0 0 42px rgba(127,90,240,.22), inset 0 0 40px rgba(0,0,0,.5); outline:none; touch-action:none; }

function resizeCanvas(){
  dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  canvas.width = Math.floor(LOGICAL_W * dpr);
  canvas.height = Math.floor(LOGICAL_H * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
canvas.focus();

const SAVE = (() => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { best:{}, cleared:{}, muted:false };
  } catch(e) { return { best:{}, cleared:{}, muted:false }; }
})();
function saveData(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(SAVE)); } catch(e) {}
}

class AudioEngine {
  constructor(){ this.ctx=null; this.muted=!!SAVE.muted; this.bgmTimer=null; this.step=0; }
  init(){
    if (this.ctx) { if (this.ctx.state==='suspended') this.ctx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    this.ctx = new AC();
    this.startBgm();
  }
  toggle(){ this.muted=!this.muted; SAVE.muted=this.muted; saveData(); }
  tone(freq=440, dur=0.08, type='sine', vol=0.08, delay=0){
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime + delay;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(Math.max(0.0001, vol), t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(t); osc.stop(t + dur + 0.02);
  }
  noise(dur=0.08, vol=0.05){
    if (!this.ctx || this.muted) return;
    const len = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<len;i++) data[i]=(Math.random()*2-1)*(1-i/len);
    const src = this.ctx.createBufferSource(); src.buffer=buf;
    const gain = this.ctx.createGain(); gain.gain.value=vol;
    src.connect(gain); gain.connect(this.ctx.destination); src.start();
  }
  startBgm(){
    if (this.bgmTimer || !this.ctx) return;
    const chords = [ [220, 277.18, 329.63], [196, 246.94, 293.66], [174.61, 220, 261.63], [207.65, 261.63, 311.13] ];
    this.bgmTimer = setInterval(() => {
      if (!this.ctx || this.muted || document.hidden || !window.game || game.state!=='playing') return;
      const chord = chords[this.step % chords.length];
      chord.forEach((f,i)=>this.tone(f, 0.55, 'sine', 0.014, i*0.03));
      const melody = [440,493.88,523.25,392,329.63,392,440,293.66][this.step%8];
      this.tone(melody, 0.12, 'triangle', 0.025, 0.18);
      this.step++;
    }, 760);
  }
  move(n=0, push=false){
    const scale=[261.63,293.66,329.63,392,440,493.88,523.25,587.33];
    this.tone(push ? 164.81 : scale[n%scale.length], push ? 0.07 : 0.055, push?'square':'triangle', push?0.045:0.035);
  }
  goal(){ this.tone(523.25,.09,'sine',.08); this.tone(783.99,.14,'triangle',.06,.08); }
  lock(){ this.tone(659.25,.07,'triangle',.08); this.tone(880,.08,'sine',.07,.06); this.tone(1174.66,.10,'triangle',.055,.13); }
  warp(rescue=false){ this.tone(rescue?196:246.94,.15,'sine',.08); this.tone(rescue?659.25:493.88,.18,'triangle',.04,.08); }
  bonk(){ this.noise(.06,.045); this.tone(130.81,.08,'square',.05); }
  hit(){ this.noise(.12,.08); this.tone(98,.18,'sawtooth',.08); }
  scream(){ this.noise(.22,.13); this.tone(92,.24,'sawtooth',.14); this.tone(184,.20,'square',.10,.05); this.tone(55,.34,'sawtooth',.12,.12); }
  clear(){ [523.25,659.25,783.99,1046.5].forEach((f,i)=>this.tone(f,.16,'triangle',.07,i*.09)); }
  menu(){ this.tone(440,.05,'sine',.035); }
  handleVisibility(){
    if (!this.ctx) return;
    if (document.hidden) this.ctx.suspend?.();
    else if (!this.muted && window.game && game.state==='playing') this.ctx.resume?.();
  }
  shutdown(){
    if (this.bgmTimer) { clearInterval(this.bgmTimer); this.bgmTimer=null; }
    try { this.ctx?.close?.(); } catch(e) {}
  }
}

function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function sign(v){ return v<0?-1:v>0?1:0; }
function same(a,b){ return a.x===b.x && a.y===b.y; }
function ease(t){ t=clamp(t,0,1); return t*t*(3-2*t); }

class Game {
  constructor(){
    this.state='title'; this.menuIndex=0; this.course='ama'; this.stageCursor=0; this.stage=null; this.stageIndex=0;
    this.player=null; this.boxes=[]; this.enemies=[]; this.flying=[]; this.hunters=[]; this.goals=[]; this.movingGoals=[]; this.rescueWarps=[]; this.normalWarps=[];
    this.map=[]; this.width=10; this.height=10; this.tile=40; this.boardX=0; this.boardY=0;
    this.effects=[]; this.inputBuffer=null; this.busyUntil=0; this.moveTone=0; this.combo=0; this.lastMoveAt=0; this.turns=0; this.hits=0;
    this.startedAt=0; this.elapsedBeforePause=0; this.pauseStarted=0; this.clearInfo=null; this.error=''; this.rescueIndex=0;
    this.shake=0; this.message=''; this.messageUntil=0;
    this.validateAllStages();
  }
  validateAllStages(){
    try { STAGES.forEach((s,i)=>this.validateStage(s,i)); }
    catch(e){ this.error=e.message; this.state='error'; }
  }
  validateStage(s, idx){
    if (!s.width || !s.height) throw new Error(`Stage ${idx+1}: width/height missing`);
    if (!Array.isArray(s.map) || s.map.length !== s.height) throw new Error(`${s.name}: map height mismatch`);
    let p=0,b=0,g=0,w=0;
    const allowed = new Set('#.PBGQWHAFVavXYMK'.split(''));
    for (const row of s.map){
      if (row.length !== s.width) throw new Error(`${s.name}: map row width mismatch (${row.length} != ${s.width})`);
      for (const ch of row){
        if (!allowed.has(ch)) throw new Error(`${s.name}: unknown map char ${ch}`);
        if (ch==='P') p++; if (ch==='B') b++; if (ch==='G' || ch==='M') g++; if (ch==='W') w++;
      }
    }
    const extraMoving = s.movingGoals ? s.movingGoals.length : 0;
    // If M markers are paired with explicit movingGoals, do not double count them.
    const mMarkers = s.map.join('').split('').filter(c=>c==='M').length;
    const effectiveGoals = g - mMarkers + (extraMoving || mMarkers);
    if (p !== 1) throw new Error(`${s.name}: P must be exactly 1`);
    if (b !== effectiveGoals) throw new Error(`${s.name}: boxes (${b}) and goals (${effectiveGoals}) mismatch`);
    if (w !== 0 && w % 2 !== 0) throw new Error(`${s.name}: W warps must be pairs`);
  }
  filteredStages(){ return STAGES.filter(s=>s.course===this.course); }
  loadStage(course, idx){
    this.course = course; this.stageIndex = idx;
    const list = this.filteredStages();
    const s = list[idx];
    if (!s) return;
    this.stage = s; this.width=s.width; this.height=s.height;
    this.map=[]; this.boxes=[]; this.enemies=[]; this.flying=[]; this.hunters=[]; this.goals=[]; this.movingGoals=[]; this.rescueWarps=[]; this.normalWarps=[];
    let normalWarps=[]; let mMarkers=[];
    for(let y=0;y<s.height;y++){
      const row=[];
      for(let x=0;x<s.width;x++){
        const ch=s.map[y][x];
        if (ch==='#') { row.push('#'); continue; }
        row.push('.');
        if (ch==='P') this.player=this.actor(x,y,'player');
        else if (ch==='B') this.boxes.push(this.actor(x,y,'box'));
        else if (ch==='G') this.goals.push({x,y});
        else if (ch==='Q') this.rescueWarps.push({x,y});
        else if (ch==='W') normalWarps.push({x,y});
        else if (ch==='H') row[x]='H';
        else if ('AavVXY'.includes(ch)) this.enemies.push(this.makeEnemy(x,y,ch));
        else if (ch==='F') this.flying.push(this.makeFlying(x,y));
        else if (ch==='K') this.hunters.push(this.makeHunter(x,y));
        else if (ch==='M') mMarkers.push({x,y});
      }
      this.map.push(row);
    }
    for(let i=0;i<normalWarps.length;i+=2){
      if (normalWarps[i+1]) this.normalWarps.push({ a:normalWarps[i], b:normalWarps[i+1] });
    }
    const movingSource = s.movingGoals || mMarkers.map(m=>({x:m.x,y:m.y,path:[[m.x,m.y],[m.x+1,m.y],[m.x,m.y]],interval:950}));
    this.movingGoals = movingSource.map((m,i)=>({
      id:i, x:m.x, y:m.y, fromX:m.x, fromY:m.y, drawX:m.x, drawY:m.y, path:m.path || [[m.x,m.y]], idx:0, interval:m.interval||1000,

    const waitingEnemies=this.enemies.filter(e=>e.offscreenUntil&&now<e.offscreenUntil).map(e=>({kind:'enemy', icon:'👻'}));
    const waitingHunters=this.hunters.filter(h=>h.offscreenUntil&&now<h.offscreenUntil).map(h=>({kind:'hunter', icon:'👹'}));
    const waiting=waitingEnemies.concat(waitingHunters);
    if (!waiting.length) return;
    const x0=this.boardX+this.width*this.tile+18;
    let y=this.boardY+12;
    const pulse=0.45+0.55*Math.sin(now*0.012);
    ctx.save(); ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.globalAlpha=0.75+0.25*pulse; ctx.fillStyle=COLORS.sub; ctx.font='13px system-ui';
    ctx.fillText('画面外待機', x0, y); y+=24;
    waiting.slice(0,7).forEach((e,i)=>{
      const yy=y+i*42;
      ctx.save(); ctx.globalAlpha=0.45+0.55*Math.abs(Math.sin(now*0.01+i));
      ctx.font=(e.kind==='hunter'?'48px':'24px')+' "Apple Color Emoji","Segoe UI Emoji",serif'; ctx.fillText(e.icon, x0+4, yy);
      ctx.restore();
      ctx.font='12px system-ui'; ctx.fillStyle=e.kind==='hunter'?COLORS.danger:COLORS.goal; ctx.fillText(pulse>0.5?'待機中…':'まもなく復帰', x0+(e.kind==='hunter'?56:38), yy);
    });
    ctx.restore();
  }
  drawHunter(h,now){
    if (h.offscreenUntil && now<h.offscreenUntil) return;
    const dyingHunter = h.dyingUntil && now<h.dyingUntil;
    if (dyingHunter && Math.floor(now/130)%2===0) return;
    const pos=this.drawPos(h,now); const p=this.gridToPixel(pos.x,pos.y);
    const flicker=0.72+0.28*Math.sin(now*.04);
    const jx=(Math.random()-.5)*5, jy=(Math.random()-.5)*5;
    ctx.save();
    ctx.globalAlpha=.28*flicker; ctx.fillStyle=COLORS.danger; ctx.beginPath(); ctx.arc(p.x+jx,p.y+jy,this.tile*(dyingHunter?1.25:1.05)+Math.sin(now*.009)*6,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=.52; ctx.strokeStyle=COLORS.danger; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(p.x+jx,p.y+jy,this.tile*(dyingHunter?1.18:.98)+Math.sin(now*.015)*5,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    this.emojiAt('👹',p.x+jx,p.y+jy,this.tile*(dyingHunter?2.15:1.85));
    if (dyingHunter) this.emojiAt('💫',p.x+this.tile*.72,p.y-this.tile*.7,this.tile*.55);
    else if (h.mode==='charge' && now<h.chargeUntil) this.emojiAt('💢',p.x+this.tile*.55,p.y-this.tile*.62,this.tile*.42);
  }
  drawGameOver(){
    const info=this.clearInfo||{}; overlay(.82); ctx.textAlign='center';
    ctx.fillStyle=COLORS.danger; ctx.font='900 54px system-ui'; ctx.fillText('GAME OVER',LOGICAL_W/2,235);
    ctx.fillStyle=COLORS.text; ctx.font='22px system-ui'; ctx.fillText(info.msg||'巨大敵に捕まりました',LOGICAL_W/2,290);
    ctx.fillStyle=COLORS.sub; ctx.font='18px system-ui'; ctx.fillText('R / Enter でリトライ　Backspaceでステージ選択',LOGICAL_W/2,350);
  }
  drawFlying(f,now){
    const p=this.gridToPixel(f.x,f.y); ctx.save(); ctx.globalAlpha=.9; ctx.shadowBlur=12; ctx.shadowColor=COLORS.danger; this.emojiAt('🔥',p.x,p.y,this.tile*.55); ctx.restore();
  }
  emoji(text,x,y,now,ox=0,oy=0,scale=.7){ const p=this.gridToPixel(x,y); this.emojiAt(text,p.x+ox,p.y+oy,this.tile*scale); }
  emojiAt(text,x,y,size){ ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font=`${Math.floor(size)}px "Apple Color Emoji","Segoe UI Emoji",serif`; ctx.fillText(text,x,y+1); }
  drawEffects(now){
    for(const e of this.effects){
      const t=(now-e.start)/e.life; ctx.save(); ctx.globalAlpha=1-t; ctx.fillStyle=e.color; ctx.font=`700 ${e.size*(1+t*.25)}px system-ui, "Apple Color Emoji","Segoe UI Emoji"`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(e.text, e.x + e.vx*(now-e.start), e.y + e.vy*(now-e.start)); ctx.restore();
    }
  }
  drawPause(){
    overlay(); ctx.textAlign='center'; ctx.fillStyle=COLORS.text; ctx.font='700 42px system-ui'; ctx.fillText('PAUSE',LOGICAL_W/2,260); ctx.font='18px system-ui'; ctx.fillStyle=COLORS.sub; ctx.fillText('Esc / P で再開　Rでリトライ　Backspaceでステージ選択',LOGICAL_W/2,320);
  }
  drawClear(){
    const info=this.clearInfo||{}; overlay(.78); ctx.textAlign='center';
    ctx.fillStyle=COLORS.clear; ctx.font='700 34px system-ui'; ctx.fillText('STAGE CLEAR!',LOGICAL_W/2,165);
    ctx.fillStyle=COLORS.goal; ctx.font='900 96px system-ui'; ctx.fillText(info.rank||'S',LOGICAL_W/2,285);
    ctx.fillStyle=COLORS.text; ctx.font='20px ui-monospace, monospace'; ctx.fillText(`TIME ${info.time?.toFixed(1)||'0.0'}s   MOVE ${info.turns||0}   HIT ${info.hits||0}`,LOGICAL_W/2,340);
    ctx.fillStyle=info.bestUpdate?COLORS.goal:COLORS.sub; ctx.font='17px system-ui'; ctx.fillText(info.bestUpdate?'BEST TIME UPDATED!':'',LOGICAL_W/2,375);
    ctx.fillStyle=COLORS.sub; ctx.font='17px system-ui'; ctx.fillText('Enter: 次へ　R: リトライ　Backspace: ステージ選択',LOGICAL_W/2,430);
  }
  drawCourseClear(now){
    ctx.textAlign='center'; ctx.fillStyle=COLORS.clear; ctx.font='700 42px system-ui'; ctx.fillText('COURSE COMPLETE!',LOGICAL_W/2,210);
    ctx.font='72px serif'; ctx.fillText('🎉 ✨ 🎵',LOGICAL_W/2,310);
    ctx.fillStyle=COLORS.text; ctx.font='20px system-ui'; ctx.fillText('真夜中の倉庫を抜けました。Sランクを狙ってもう一度！',LOGICAL_W/2,380);
    ctx.fillStyle=COLORS.sub; ctx.font='17px system-ui'; ctx.fillText('Enterでステージ選択へ',LOGICAL_W/2,440);
  }
  drawError(){
    ctx.textAlign='center'; ctx.fillStyle=COLORS.danger; ctx.font='700 30px system-ui'; ctx.fillText('STAGE DATA ERROR',LOGICAL_W/2,240);
    ctx.fillStyle=COLORS.text; ctx.font='16px ui-monospace, monospace'; wrapText(ctx,this.error,LOGICAL_W/2,300,760,24);
  }
}
function roundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); if(fill) ctx.fill(); if(stroke) ctx.stroke();
}
function overlay(alpha=.72){ ctx.fillStyle=`rgba(10,10,20,${alpha})`; ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H); }
function wrapText(ctx,text,x,y,maxWidth,lineHeight){ const words=String(text).split(' '); let line=''; for(const w of words){ const test=line+w+' '; if(ctx.measureText(test).width>maxWidth){ ctx.fillText(line,x,y); line=w+' '; y+=lineHeight; } else line=test; } ctx.fillText(line,x,y); }

const game = new Game();
window.game = game;
window.addEventListener('keydown', e=>game.handleKey(e));
canvas.addEventListener('pointerdown', () => { audio.init(); canvas.focus(); if (game.state==='title') game.state='course'; });
document.addEventListener('visibilitychange',()=>{ audio.handleVisibility(); if (document.hidden && game.state==='playing') game.pause(); });
window.addEventListener('beforeunload',()=>audio.shutdown());

function loop(now){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  game.update(now); game.draw(now); requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
